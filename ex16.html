<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CSS Colors, Backgrounds, Borders</title>
    <style>
        h1 {
            padding: 10px;
            margin-bottom: 20px;
        }

        .box1 {
            background-color: lightblue;
            border-style: double;        
            border-color: Tomato;        
            border-width: 8px;           
        }

        .box2 {
            background-color: yellow;    
            border-style: solid;         
            border-color: DodgerBlue;    
            border-width: 4px;           
            border-radius: 15px;        
        }

        .box3 {
            background-color: MediumSeaGreen;
            border-style: dotted;            
            border-color: Gray;               
            border-width: 10px;               
        }
    </style>
</head>
<body>

    <h1 class="box1">Hello World</h1>
    <h1 class="box2">Hello World</h1>
    <h1 class="box3">Hello World</h1>

</body>
</html>
